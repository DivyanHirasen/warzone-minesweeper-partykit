<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINEFIELD OPERATIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0a;
  --panel: #0f130f;
  --border: #2a3d2a;
  --green: #39ff14;
  --green-dim: #1a7a08;
  --green-glow: rgba(57,255,20,0.15);
  --amber: #ffaa00;
  --red: #ff3030;
  --cell-hidden: #1c2b1c;
  --cell-hover: #243824;
  --cell-revealed: #111811;
  --cell-border: #2e452e;
  --text: #a8c8a8;
  --scanline: rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
  overflow: hidden;
  position: relative;
  padding: 16px;
}

/* CRT scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    var(--scanline) 0px,
    var(--scanline) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 100;
}

/* Vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 99;
}

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  max-width: 520px;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* Header */
#header {
  width: 100%;
  text-align: center;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 8px 0;
  position: relative;
}

#header::before, #header::after {
  content: '◆';
  position: absolute;
  color: var(--green-dim);
  font-size: 10px;
  top: 50%;
  transform: translateY(-50%);
}
#header::before { left: 8px; }
#header::after { right: 8px; }

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(14px, 4vw, 20px);
  font-weight: 900;
  color: var(--green);
  letter-spacing: 6px;
  text-shadow: 0 0 10px var(--green), 0 0 30px rgba(57,255,20,0.4);
}

#subtitle {
  font-size: 9px;
  color: var(--green-dim);
  letter-spacing: 3px;
  margin-top: 3px;
}

/* HUD */
#hud {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  width: 100%;
  gap: 8px;
  align-items: center;
}

.hud-box {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: center;
}

.hud-label {
  font-size: 8px;
  color: var(--green-dim);
  letter-spacing: 2px;
  display: block;
  margin-bottom: 2px;
}

.hud-value {
  font-size: 20px;
  color: var(--amber);
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 8px rgba(255,170,0,0.5);
  display: block;
}

#smiley-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  width: 48px;
  height: 48px;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  position: relative;
}

#smiley-btn:hover {
  border-color: var(--green);
  box-shadow: 0 0 8px var(--green-glow);
}

/* Difficulty */
#difficulty {
  display: flex;
  gap: 6px;
}

.diff-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}

.diff-btn:hover, .diff-btn.active {
  border-color: var(--green);
  color: var(--green);
  box-shadow: 0 0 6px var(--green-glow);
}

/* Board */
#board-wrap {
  position: relative;
  width: 100%;
}

#board {
  display: grid;
  gap: 2px;
  width: 100%;
  user-select: none;
}

.cell {
  aspect-ratio: 1;
  background: var(--cell-hidden);
  border: 1px solid var(--cell-border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(9px, 2.5vw, 13px);
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  position: relative;
  transition: background 0.1s, box-shadow 0.1s;
  overflow: hidden;
}

.cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}

.cell:hover:not(.revealed):not(.flagged) {
  background: var(--cell-hover);
  border-color: var(--green-dim);
}

.cell.revealed {
  background: var(--cell-revealed);
  border-color: #1a2a1a;
  cursor: default;
}

.cell.flagged { cursor: pointer; }

.cell.mine-exploded {
  background: #3a0a0a !important;
  border-color: var(--red) !important;
  animation: explode 0.4s ease-out;
}

.cell.mine-show {
  background: #200808;
  border-color: #3a1a1a;
}

@keyframes explode {
  0% { transform: scale(1); background: #ff3030; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.cell.reveal-anim {
  animation: revealCell 0.2s ease-out;
}

@keyframes revealCell {
  0% { transform: scale(0.85); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

/* Number colors */
.n1 { color: #4fc3f7; }
.n2 { color: #81c784; }
.n3 { color: #ef5350; }
.n4 { color: #7e57c2; }
.n5 { color: #ff7043; }
.n6 { color: #26c6da; }
.n7 { color: #ec407a; }
.n8 { color: var(--text); }

/* Sonar pulse overlay */
.sonar-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid var(--green);
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: sonarExpand 1.1s ease-out forwards;
  z-index: 10;
}

@keyframes sonarExpand {
  0% { width: 0; height: 0; opacity: 0.9; box-shadow: 0 0 12px var(--green), 0 0 30px rgba(57,255,20,0.5); }
  100% { width: 140%; height: 140%; opacity: 0; box-shadow: 0 0 4px var(--green); }
}

/* Cell sonar highlight */
.cell.sonar-hot   { animation: sonarFlash 0.5s ease-out; --fc: #ff3030; }
.cell.sonar-warm  { animation: sonarFlash 0.5s ease-out; --fc: #ffaa00; }
.cell.sonar-cool  { animation: sonarFlash 0.5s ease-out; --fc: #39ff14; }

@keyframes sonarFlash {
  0%   { box-shadow: inset 0 0 0 2px var(--fc), 0 0 10px var(--fc); background: color-mix(in srgb, var(--fc) 25%, var(--cell-hidden)); }
  60%  { box-shadow: inset 0 0 0 1px var(--fc), 0 0 6px var(--fc); }
  100% { box-shadow: none; background: var(--cell-hidden); }
}

/* Sonar controls */
#sonar-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 8px 12px;
  gap: 12px;
}

#sonar-info {
  flex: 1;
}

#sonar-title {
  font-size: 9px;
  color: var(--green);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}

#sonar-desc {
  font-size: 8px;
  color: #5a7a5a;
  line-height: 1.4;
}

#sonar-charges {
  display: flex;
  gap: 5px;
}

.charge {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--green-dim);
  border: 1px solid var(--green);
  transition: all 0.3s;
  position: relative;
}

.charge.active {
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 16px rgba(57,255,20,0.4);
  animation: chargePulse 1.5s ease-in-out infinite;
}

@keyframes chargePulse {
  0%, 100% { box-shadow: 0 0 8px var(--green), 0 0 16px rgba(57,255,20,0.4); }
  50% { box-shadow: 0 0 14px var(--green), 0 0 28px rgba(57,255,20,0.6); }
}

.charge.spent { background: #151f15; border-color: #2a3a2a; }

#sonar-btn {
  background: transparent;
  border: 1px solid var(--green-dim);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

#sonar-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green-glow);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s;
}

#sonar-btn:hover:not(:disabled)::before { transform: scaleX(1); }
#sonar-btn:hover:not(:disabled) { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
#sonar-btn.sonar-armed { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px var(--green), 0 0 20px rgba(57,255,20,0.3); animation: armedPulse 0.6s ease-in-out infinite; }
#sonar-btn:disabled { opacity: 0.3; cursor: not-allowed; }

@keyframes armedPulse {
  0%, 100% { box-shadow: 0 0 10px var(--green), 0 0 20px rgba(57,255,20,0.3); }
  50% { box-shadow: 0 0 18px var(--green), 0 0 35px rgba(57,255,20,0.5); }
}

/* Legend */
#legend {
  display: flex;
  gap: 12px;
  font-size: 8px;
  color: #4a6a4a;
  letter-spacing: 1px;
}

.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Win/Lose overlay */
#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}

#overlay.hidden { display: none; }

#overlay-box {
  background: var(--panel);
  border: 1px solid var(--green);
  padding: 32px 40px;
  text-align: center;
  box-shadow: 0 0 40px var(--green-glow), 0 0 80px rgba(57,255,20,0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#overlay-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 4px;
}

#overlay-sub { font-size: 10px; color: #6a8a6a; letter-spacing: 2px; }

#overlay-btn {
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  padding: 10px 24px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
#overlay-btn:hover { background: var(--green-glow); box-shadow: 0 0 12px var(--green); }

/* Status bar */
#status {
  font-size: 9px;
  color: var(--green-dim);
  letter-spacing: 2px;
  height: 12px;
  transition: color 0.3s;
}
#status.alert { color: var(--amber); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>MINEFIELD OPERATIVE</h1>
    <div id="subtitle">▸ TACTICAL MINE CLEARANCE SYSTEM ◂</div>
  </div>

  <div id="hud">
    <div class="hud-box">
      <span class="hud-label">◈ MINES</span>
      <span class="hud-value" id="mine-count">0</span>
    </div>
    <button id="smiley-btn" title="New Game">🟢</button>
    <div class="hud-box">
      <span class="hud-label">⏱ TIME</span>
      <span class="hud-value" id="timer">000</span>
    </div>
  </div>

  <div id="difficulty">
    <button class="diff-btn active" data-diff="easy">RECON</button>
    <button class="diff-btn" data-diff="medium">FIELD</button>
    <button class="diff-btn" data-diff="hard">WARZONE</button>
  </div>

  <div id="sonar-bar">
    <div id="sonar-info">
      <div id="sonar-title">📡 SEISMIC SONAR</div>
      <div id="sonar-desc">Deploy a pulse to reveal mine density nearby.<br><span style="color:#3a6a3a">🟥 adjacent &nbsp; 🟨 close &nbsp; 🟩 clear</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div id="sonar-charges"></div>
      <button id="sonar-btn">SCAN</button>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="legend">
    <div class="legend-item"><span>🚩 right-click / long-press = flag</span></div>
    <div class="legend-item"><span>🖱 left-click = reveal</span></div>
  </div>

  <div id="status">▸ AWAITING ORDERS...</div>
</div>

<div id="overlay" class="hidden">
  <div id="overlay-box">
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
    <button id="overlay-btn">REDEPLOY</button>
  </div>
</div>

<script>
const CONFIGS = {
  easy:   { rows:9,  cols:9,  mines:10, label:'RECON'   },
  medium: { rows:16, cols:16, mines:40, label:'FIELD'   },
  hard:   { rows:16, cols:30, mines:99, label:'WARZONE' },
};

let cfg = CONFIGS.easy;
let grid = [], revealed = [], flagged = [], minePos = new Set();
let gameState = 'idle'; // idle, playing, won, lost
let timerInterval = null, startTime = null, elapsed = 0;
let minesLeft, firstClick = true;
let sonarCharges = 3, sonarArmed = false;

// Init
function newGame() {
  clearInterval(timerInterval);
  elapsed = 0; firstClick = true; sonarArmed = false;
  gameState = 'idle';
  updateTimer(0);
  document.getElementById('smiley-btn').textContent = '🟢';
  document.getElementById('sonar-btn').classList.remove('sonar-armed');

  const {rows, cols, mines} = cfg;
  grid = []; revealed = []; flagged = []; minePos = new Set();
  minesLeft = mines;
  sonarCharges = 3;
  updateMineCount();
  updateSonarCharges();
  updateStatus('▸ CLICK TO BEGIN SWEEP...');

  // Build grid
  for (let r=0;r<rows;r++) { grid.push([]); revealed.push([]); flagged.push([]); for(let c=0;c<cols;c++){grid[r].push(0);revealed[r].push(false);flagged[r].push(false);} }

  renderBoard();
  document.getElementById('overlay').classList.add('hidden');
}

function placeMines(safeR, safeC) {
  const {rows, cols, mines} = cfg;
  const safe = new Set();
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
    const nr=safeR+dr, nc=safeC+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols) safe.add(nr*cols+nc);
  }
  safe.add(safeR*cols+safeC);

  while(minePos.size < mines) {
    const idx = Math.floor(Math.random()*rows*cols);
    if(!safe.has(idx)) minePos.add(idx);
  }
  // Compute numbers
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    if(minePos.has(r*cols+c)) { grid[r][c]=-1; continue; }
    let count=0;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&minePos.has(nr*cols+nc)) count++;
    }
    grid[r][c]=count;
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  const {rows, cols} = cfg;
  // Responsive cell size
  const maxW = Math.min(document.getElementById('app').clientWidth, 500);
  const cellSize = Math.max(22, Math.floor((maxW - (cols-1)*2) / cols));
  board.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  board.innerHTML = '';

  for(let r=0;r<rows;r++) {
    for(let c=0;c<cols;c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      cell.style.fontSize = Math.max(8, cellSize*0.45)+'px';
      updateCellDisplay(cell, r, c);
      cell.addEventListener('click', onCellClick);
      cell.addEventListener('contextmenu', onCellRight);
      cell.addEventListener('touchstart', onTouchStart, {passive:true});
      cell.addEventListener('touchend', onTouchEnd);
      board.appendChild(cell);
    }
  }
}

function getCell(r,c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function updateCellDisplay(cell, r, c) {
  cell.className = 'cell';
  cell.textContent = '';
  if(flagged[r][c]) { cell.textContent = '🚩'; return; }
  if(!revealed[r][c]) return;
  cell.classList.add('revealed');
  const v = grid[r][c];
  if(v === -1) { cell.textContent = '💥'; cell.classList.add('mine-exploded'); }
  else if(v > 0) { cell.textContent = v; cell.classList.add(`n${v}`); }
}

function onCellClick(e) {
  const r = +this.dataset.r, c = +this.dataset.c;
  if(sonarArmed) { fireSonar(r, c); return; }
  if(gameState === 'lost' || gameState === 'won') return;
  if(flagged[r][c] || revealed[r][c]) return;

  if(firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
    gameState = 'playing';
    updateStatus('▸ SWEEP IN PROGRESS...');
  }

  reveal(r, c);
  checkWin();
}

function onCellRight(e) {
  e.preventDefault();
  const r = +this.dataset.r, c = +this.dataset.c;
  if(gameState === 'lost' || gameState === 'won') return;
  if(revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  minesLeft += flagged[r][c] ? -1 : 1;
  updateMineCount();
  updateCellDisplay(this, r, c);
}

// Long press for mobile flag
let longPressTimer = null;
function onTouchStart(e) {
  const cell = this;
  longPressTimer = setTimeout(() => {
    onCellRight.call(cell, {preventDefault:()=>{}});
    longPressTimer = null;
  }, 500);
}
function onTouchEnd(e) {
  if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function reveal(r, c) {
  const {rows, cols} = cfg;
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flagged[r][c]) return;
  revealed[r][c] = true;
  const cell = getCell(r, c);
  if(cell) { updateCellDisplay(cell, r, c); cell.classList.add('reveal-anim'); }

  if(grid[r][c] === -1) {
    // Hit mine
    gameState = 'lost';
    clearInterval(timerInterval);
    document.getElementById('smiley-btn').textContent = '💀';
    // Reveal all mines
    setTimeout(() => revealAllMines(r, c), 100);
    setTimeout(() => showOverlay(false), 600);
    return;
  }
  if(grid[r][c] === 0) {
    // Flood fill
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
      if(dr===0&&dc===0) continue;
      reveal(r+dr, c+dc);
    }
  }
}

function revealAllMines(explodeR, explodeC) {
  const {rows, cols} = cfg;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    if(minePos.has(r*cols+c)) {
      const cell = getCell(r,c);
      if(!revealed[r][c] && !flagged[r][c]) {
        cell.classList.add('mine-show');
        cell.textContent = '💣';
      }
    }
  }
  const exploded = getCell(explodeR, explodeC);
  if(exploded) { exploded.textContent='💥'; exploded.classList.add('mine-exploded'); }
}

function checkWin() {
  const {rows, cols, mines} = cfg;
  let revealedCount = 0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(revealed[r][c]) revealedCount++;
  if(revealedCount === rows*cols - mines) {
    gameState = 'won';
    clearInterval(timerInterval);
    document.getElementById('smiley-btn').textContent = '🏆';
    setTimeout(() => showOverlay(true), 300);
  }
}

function showOverlay(won) {
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = won ? '✦ AREA SECURED ✦' : '✖ OPERATIVE DOWN ✖';
  document.getElementById('overlay-title').style.color = won ? 'var(--green)' : 'var(--red)';
  document.getElementById('overlay-title').style.textShadow = won
    ? '0 0 20px var(--green)' : '0 0 20px var(--red)';
  const t = document.getElementById('timer').textContent;
  document.getElementById('overlay-sub').textContent = won
    ? `FIELD CLEARED IN ${t}s — ALL MINES NEUTRALIZED`
    : `MISSION FAILED — DETONATION AT T+${t}s`;
  ov.classList.remove('hidden');
}

// Timer
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    elapsed = Math.floor((Date.now()-startTime)/1000);
    updateTimer(elapsed);
  }, 200);
}

function updateTimer(v) {
  document.getElementById('timer').textContent = String(v).padStart(3,'0');
}

function updateMineCount() {
  document.getElementById('mine-count').textContent = String(minesLeft).padStart(3,'0');
}

function updateStatus(msg, alert=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = alert ? 'alert' : '';
}

// ═══════════════════════════════════════════
//  🎯 SEISMIC SONAR — THE COOL FEATURE
//  Fires a ripple outward from clicked cell.
//  Each unrevealed cell lights up based on
//  how many mines are adjacent to it:
//   🔴 red  = 1-2 mines directly adjacent
//   🟡 amber = 3-4 cells away from a mine
//   🟢 green = no mines nearby (5+ cells)
// ═══════════════════════════════════════════
function fireSonar(originR, originC) {
  if(sonarCharges <= 0 || gameState === 'lost' || gameState === 'won') return;
  sonarCharges--;
  sonarArmed = false;
  document.getElementById('sonar-btn').classList.remove('sonar-armed');
  document.getElementById('sonar-btn').textContent = 'SCAN';
  updateSonarCharges();
  if(sonarCharges === 0) document.getElementById('sonar-btn').disabled = true;
  updateStatus('▸ SEISMIC PULSE DEPLOYED...', true);
  setTimeout(() => updateStatus('▸ SWEEP IN PROGRESS...'), 1800);

  const {rows, cols} = cfg;
  const boardWrap = document.getElementById('board-wrap');
  const originCell = getCell(originR, originC);
  if(!originCell) return;

  // Visual ring
  const rect = originCell.getBoundingClientRect();
  const wrapRect = boardWrap.getBoundingClientRect();
  const ring = document.createElement('div');
  ring.className = 'sonar-ring';
  ring.style.left = (rect.left - wrapRect.left + rect.width/2) + 'px';
  ring.style.top  = (rect.top  - wrapRect.top  + rect.height/2) + 'px';
  boardWrap.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());

  // Build proximity map: for each unrevealed cell, find min distance to nearest mine
  // (using manhattan distance since we don't know where mines are — use number hints
  //  if revealed, otherwise we compute from actual mine positions if game started)
  const maxRadius = Math.max(rows, cols);

  // We reveal info in rings: cells at distance d get highlighted after a delay
  for(let r=0;r<rows;r++) {
    for(let c=0;c<cols;c++) {
      if(revealed[r][c] || flagged[r][c]) continue;
      const dist = Math.abs(r-originR) + Math.abs(c-originC);
      const delay = dist * 55 + 50;

      // Find minimum manhattan distance to nearest mine
      let minMineDist = Infinity;
      if(firstClick) {
        // No mines placed yet — can't scan
        continue;
      }
      for(const idx of minePos) {
        const mr = Math.floor(idx/cols), mc = idx%cols;
        const d = Math.abs(r-mr) + Math.abs(c-mc);
        if(d < minMineDist) minMineDist = d;
      }

      let cls;
      if(minMineDist <= 1)      cls = 'sonar-hot';   // mine right here or adjacent
      else if(minMineDist <= 3) cls = 'sonar-warm';  // mine close
      else                      cls = 'sonar-cool';  // clear area

      const cell = getCell(r, c);
      if(!cell) continue;
      setTimeout(() => {
        cell.classList.add(cls);
        cell.addEventListener('animationend', () => cell.classList.remove(cls), {once:true});
      }, delay);
    }
  }
}

function updateSonarCharges() {
  const el = document.getElementById('sonar-charges');
  el.innerHTML = '';
  for(let i=0;i<3;i++) {
    const dot = document.createElement('div');
    dot.className = 'charge' + (i < sonarCharges ? ' active' : ' spent');
    el.appendChild(dot);
  }
}

// Sonar button
document.getElementById('sonar-btn').addEventListener('click', () => {
  if(sonarCharges <= 0 || gameState === 'lost' || gameState === 'won') return;
  if(firstClick) { updateStatus('▸ START SWEEP FIRST TO USE SONAR', true); setTimeout(()=>updateStatus('▸ CLICK TO BEGIN SWEEP...'),2000); return; }
  sonarArmed = !sonarArmed;
  const btn = document.getElementById('sonar-btn');
  btn.classList.toggle('sonar-armed', sonarArmed);
  btn.textContent = sonarArmed ? '● ARMED' : 'SCAN';
  updateStatus(sonarArmed ? '▸ SONAR ARMED — CLICK TARGET CELL' : '▸ SWEEP IN PROGRESS...', sonarArmed);
});

// Smiley = new game
document.getElementById('smiley-btn').addEventListener('click', newGame);
document.getElementById('overlay-btn').addEventListener('click', newGame);

// Difficulty
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    cfg = CONFIGS[this.dataset.diff];
    newGame();
  });
});

// Resize
window.addEventListener('resize', () => { if(grid.length) renderBoard(); });

newGame();
</script>
